---
# Universal Search — pre-commit hook configuration (REQ-BOOT-008)
# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files
# Update revs: pre-commit autoupdate
#
# Framework directories (.claude/, .moai/) are excluded from file-hygiene
# and formatter hooks because those files are managed by MoAI-ADK upstream
# (see `moai update`) and auto-formatting them would create spurious churn.

# Global exclude: skip framework-managed and generated artifacts.
exclude: |
  (?x)^(
    \.claude/.*|
    \.moai/.*|
    web/node_modules/.*|
    web/\.next/.*|
    web/pnpm-lock\.yaml|
    uv\.lock|
    docs/licenses/.*|
    internal/eval/golden/corpus/.*
  )$

repos:
  # ── General file hygiene ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        # Helm chart templates contain Go templating ({{- ... }}) that is not
        # valid standalone YAML; check-yaml cannot parse them.
        exclude: ^charts/.*/templates/.*
      - id: check-added-large-files
        args: [--maxkb=1000]

  # ── Go formatting and imports ────────────────────────────────────────────────
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-imports
      - id: go-mod-tidy

  # ── Python linting and formatting (ruff) ────────────────────────────────────
  # rev kept in sync with the ruff version declared in services/*/pyproject.toml
  # dev dependency-group to avoid cross-version format drift.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── Web formatting (Prettier) ────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(js|ts|tsx|jsx|json|md|yaml|yml)$

  # ── Web linting (ESLint via local pnpm) ─────────────────────────────────────
  # Runs the workspace's pinned ESLint config from web/eslint.config.mjs against
  # staged TS/JS files. Local hook so the version stays in lockstep with
  # web/package.json (no separate rev to drift).
  - repo: local
    hooks:
      - id: eslint
        name: eslint (web)
        language: system
        files: ^web/.*\.(js|jsx|ts|tsx|mjs|cjs)$
        # Pre-commit passes repo-root-relative paths (web/src/foo.tsx). The
        # workspace ESLint runs inside web/ via `pnpm -C web`, so each argument
        # must have its leading "web/" stripped before being handed to ESLint.
        entry: scripts/run-eslint-web.sh
        pass_filenames: true

  # ── Secret scanning (SPEC-SEC-001 REQ-SEC-004) ──────────────────────────────
  # Blocks commits containing secrets not present in the .gitleaks.toml
  # allowlist. The CI security.yml gitleaks job is the backstop if this hook is
  # bypassed with --no-verify.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.20.0
    hooks:
      - id: gitleaks

  # ── Dockerfile linting ───────────────────────────────────────────────────────
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint

  # ── Shell script linting ─────────────────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  # ── YAML linting ─────────────────────────────────────────────────────────────
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-d, relaxed]
        # Helm chart templates are Go-templated ({{- ... }}), not standalone YAML.
        exclude: ^charts/.*/templates/.*
