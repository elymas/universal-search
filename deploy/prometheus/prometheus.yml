# Prometheus scrape configuration for Universal Search local development stack.
# REQ-OBS-004: Prometheus scrapes usearch admin server /metrics endpoint.
#
# host.docker.internal resolves to the Docker host on macOS and Windows.
# On Linux add: extra_hosts: ["host.docker.internal:host-gateway"] in docker-compose.yml.

global:
  scrape_interval: 15s
  # SPEC-EVAL-002 NFR-EVAL2-003 / amendment A4: recording-rule + alert `for:`
  # durations assume a 1m evaluation cadence. scrape_interval stays 15s
  # (scrape and rule evaluation are independent).
  evaluation_interval: 1m

# SPEC-EVAL-002: load recording rules + alert rules.
rule_files:
  - "recording-rules.yml"
  - "alerts.yml"

# SPEC-EVAL-002 REQ-EVAL2-008: route fired alerts to Alertmanager.
# The alertmanager hostname resolves within the docker-compose network.
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: "usearch"
    static_configs:
      - targets:
          - "host.docker.internal:${PROMETHEUS_SCRAPE_PORT:-9090}"
    metrics_path: /metrics
