version: "3.9"

# Universal Search — local development stack
# REQ-BOOT-004 / REQ-BOOT-005
#
# HARD RULES enforced here:
#   - No hardcoded credentials; all secrets via ${VAR} interpolation
#   - Every service has a healthcheck block
#   - Named volumes for all stateful services
#
# Run: make compose-up
# Stop: make compose-down
#
# SearXNG pinned to dated tag at SPEC-DEP-001 merge time (2026-04-24).
# Digest: sha256:37c616a774b90fb5df9239eb143f1b11866ddf7b830cd1ebcca6ba11b38cc2bf
# To update: follow the procedure in docs/dependencies.md §SearXNG digest pin procedure.

networks:
  app:
    driver: bridge

volumes:
  qdrant_data: {}
  meili_data: {}
  pg_data: {}
  redis_data: {}
  prometheus_data: {}
  grafana_data: {}
  embedder_models: {}

services:
  # ── Qdrant vector database ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.16.3
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # qdrant image ships no wget/curl/python; only bash. Use a raw TCP open.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app

  # ── Meilisearch keyword + hybrid index ─────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.42.1
    ports:
      - "${MEILI_PORT:-7700}:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: ${MEILI_ENV:-development}
    volumes:
      - meili_data:/meili_data
    healthcheck:
      # busybox wget resolves localhost to ::1, but meili binds IPv4 only. Use 127.0.0.1.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app

  # ── PostgreSQL metadata + audit ─────────────────────────────────────────────
  postgres:
    image: postgres:16.13-alpine3.23
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app

  # ── Redis (session cache + Asynq task queue) ────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app

  # ── SearXNG metasearch engine ────────────────────────────────────────────────
  # Pinned by digest from SPEC-DEP-001 (2026-04-24). The dated tag
  # 2026.04.22-74f1ca203 was removed from the registry upstream; the digest it
  # resolved to remains pullable, so we pin the digest directly.
  # SearXNG is AGPL-3.0; consumed as an external service (service-boundary, not linked).
  # See NOTICE and docs/dependencies.md for license compliance details.
  searxng:
    image: searxng/searxng@sha256:37c616a774b90fb5df9239eb143f1b11866ddf7b830cd1ebcca6ba11b38cc2bf
    ports:
      - "${SEARXNG_PORT:-8080}:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://localhost:8080/}
      SEARXNG_SECRET: ${SEARXNG_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app

  # ── LiteLLM proxy (unified LLM gateway) ────────────────────────────────────
  # SPEC-LLM-001: REQ-LLM-001..REQ-LLM-008
  litellm:
    image: ghcr.io/berriai/litellm:v1.83.7-stable.patch.1
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_BUDGET_USD: ${LITELLM_BUDGET_USD:-0.50}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # litellm image ships python but no wget/curl. Probe the lightweight
      # liveliness endpoint (/health pings configured models and can flap).
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app

  # ── Researcher synthesis sidecar (SPEC-SYN-001) ────────────────────────────
  researcher:
    build:
      context: ../services/researcher
    ports:
      - "${RESEARCHER_PORT:-8081}:8081"
    environment:
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
      RESEARCHER_PORT: "8081"
      RESEARCHER_MODEL_DEFAULT: claude-haiku-4-5
      RESEARCHER_TIMEOUT_SECONDS: "8"
      RESEARCHER_LOG_LEVEL: INFO
    depends_on:
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - app

  # ── BGE-M3 embedding sidecar (SPEC-IDX-002) ────────────────────────────────
  # CPU-only by default. For GPU, overlay deploy/docker-compose.gpu.yml.
  embedder:
    build:
      context: ../services/embedder
    ports:
      - "${EMBEDDER_PORT:-8082}:8082"
    environment:
      EMBEDDER_PORT: "8082"
      EMBEDDER_MODEL_NAME: ${EMBEDDER_MODEL_NAME:-BAAI/bge-m3}
      EMBEDDER_DEVICE: ${EMBEDDER_DEVICE:-cpu}
      EMBEDDER_USE_FP16: ${EMBEDDER_USE_FP16:-false}
      EMBEDDER_CACHE_MAX_ENTRIES: ${EMBEDDER_CACHE_MAX_ENTRIES:-1024}
      EMBEDDER_LOG_LEVEL: ${EMBEDDER_LOG_LEVEL:-INFO}
    volumes:
      - embedder_models:/root/.cache/huggingface
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request,sys; r=urllib.request.urlopen(''http://localhost:8082/health''); sys.exit(0 if r.status==200 else 1)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    restart: unless-stopped
    networks:
      - app

  # ── Prometheus metrics scraper ───────────────────────────────────────────────
  # REQ-OBS-004: Scrapes usearch admin server /metrics.
  # host.docker.internal resolves to the Docker host (macOS/Windows).
  # Linux: add extra_hosts: ["host.docker.internal:host-gateway"] if needed.
  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # SPEC-EVAL-002: recording rules + alert rules.
      - ./prometheus/recording-rules.yml:/etc/prometheus/recording-rules.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      # SPEC-EVAL-002 NFR-EVAL2-004: 30-day retention guarantees a full 7d
      # rolling window survives a Prometheus restart.
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - app

  # ── Grafana dashboard (SPEC-EVAL-002) ───────────────────────────────────────
  # Adapter reliability dashboard, auto-provisioned from deploy/grafana/.
  # REQ-EVAL2-006/007. Bound to localhost only.
  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - app

  # ── Alertmanager (SPEC-EVAL-002) ─────────────────────────────────────────────
  # Routes fired Prometheus alerts. Default null receiver (silent) until the
  # operator wires a channel. REQ-EVAL2-009. Optional: gate behind the `alerts`
  # compose profile so operators who do not want alerting can skip it.
  alertmanager:
    image: prom/alertmanager:v0.27.0
    profiles: ["alerts"]
    ports:
      - "127.0.0.1:${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - app

  # ── Korean tokenizer sidecar ─────────────────────────────────────────────────
  # SPEC-IDX-003: mecab-ko FastAPI sidecar on port 8083.
  # Go services reach it via TOKENIZER_KO_BASE_URL=http://tokenizer-ko:8083.
  tokenizer-ko:
    build:
      context: ../services/tokenizer-ko
      dockerfile: Dockerfile
    ports:
      - "${TOKENIZER_KO_PORT:-8083}:8083"
    environment:
      TOKENIZER_KO_PORT: "8083"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8083/health'')" || exit 1',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app
