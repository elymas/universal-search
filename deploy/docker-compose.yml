version: "3.9"

# Universal Search — local development stack
# REQ-BOOT-004 / REQ-BOOT-005
#
# HARD RULES enforced here:
#   - No hardcoded credentials; all secrets via ${VAR} interpolation
#   - Every service has a healthcheck block
#   - Named volumes for all stateful services
#
# Run: make compose-up
# Stop: make compose-down
#
# Note: searxng:latest is intentional for SPEC-BOOT-001.
# SPEC-DEP-001 will replace it with a dated digest.

networks:
  app:
    driver: bridge

volumes:
  qdrant_data: {}
  meili_data: {}
  pg_data: {}
  redis_data: {}

services:
  # ── Qdrant vector database ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.16.3
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app

  # ── Meilisearch keyword + hybrid index ─────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.42.1
    ports:
      - "${MEILI_PORT:-7700}:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: ${MEILI_ENV:-development}
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app

  # ── PostgreSQL metadata + audit ─────────────────────────────────────────────
  postgres:
    image: postgres:16.13-alpine3.23
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app

  # ── Redis (session cache + Asynq task queue) ────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app

  # ── SearXNG metasearch engine ────────────────────────────────────────────────
  # Image stays :latest for SPEC-BOOT-001; SPEC-DEP-001 pins to a dated digest.
  # SearXNG is AGPL-3.0; consumed as an external service (service-boundary, not linked).
  # See NOTICE and README for license compliance details.
  searxng:
    image: searxng/searxng:latest
    ports:
      - "${SEARXNG_PORT:-8080}:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://localhost:8080/}
      SEARXNG_SECRET: ${SEARXNG_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app

  # ── LiteLLM proxy (unified LLM gateway) ────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:v1.83.7-stable.patch.1
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app
