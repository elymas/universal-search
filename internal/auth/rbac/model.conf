# RBAC-with-domains model for Universal Search team-scoped authorization.
# REQ-AUTH2-001: 4-tuple model (sub, dom, obj, act).
# @MX:NOTE: [AUTO] Casbin RBAC-with-domains model. sub=user/role, dom=team_id, obj=resource, act=action.
# See https://casbin.org/docs/syntax-for-models#rbac-with-domains

[request_definition]
r = sub, dom, obj, act

[policy_definition]
p = sub, dom, obj, act, eft

[role_definition]
g = _, _, _

[policy_effect]
e = some(where (p.eft == allow)) && !some(where (p.eft == deny))

[matchers]
m = g(r.sub, p.sub, r.dom) && keyMatch(r.dom, p.dom) && keyMatch(r.obj, p.obj) && keyMatch(r.act, p.act)
