name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go test + lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test (race + coverage)
        run: go test ./... -race -cover

      - name: golangci-lint
        # v7 action + latest v2 binary. v2.0.x was built with Go 1.24
        # and can't target go 1.25 — newer v2 patches are built with
        # Go 1.25 so `version: latest` resolves correctly.
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout 5m
