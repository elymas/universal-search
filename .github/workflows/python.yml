name: Python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [researcher, storm, embedder]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Sync service
        run: uv sync --frozen --package ${{ matrix.service }}

      - name: Lint
        run: ruff check services/${{ matrix.service }}

      - name: Test
        run: uv run --package ${{ matrix.service }} pytest
