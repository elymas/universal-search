name: Chart CI

on:
  pull_request:
    paths:
      - "charts/universal-search/**"
      - "deploy/Dockerfile.*"
  push:
    branches: [main]
    paths:
      - "charts/universal-search/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.1

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: Run chart-testing lint
        run: ct lint --charts charts/universal-search --check-version-increment=false

      - name: Run helm lint (strict)
        run: helm lint charts/universal-search --strict

  template:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        values: [values.yaml, ci/values-prod.yaml]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.1

      - name: Update Helm dependencies
        run: |
          helm repo add bitnami oci://registry-1.docker.io/bitnamicharts
          helm repo add qdrant https://qdrant.github.io/qdrant-helm
          helm dependency update charts/universal-search
        continue-on-error: true

      - name: Helm template
        run: |
          helm template universal-search charts/universal-search \
            -f charts/universal-search/${{ matrix.values }} \
            --debug 2>&1 | head -200

  kubeconform:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        k8s-version: ["1.28.0", "1.29.0", "1.30.0", "1.31.0"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.1

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION="v0.6.7"
          curl -L "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | \
            tar xz -C /usr/local/bin kubeconform

      - name: Update Helm dependencies
        run: |
          helm repo add bitnami oci://registry-1.docker.io/bitnamicharts
          helm repo add qdrant https://qdrant.github.io/qdrant-helm
          helm dependency update charts/universal-search
        continue-on-error: true

      - name: Template and validate
        run: |
          helm template universal-search charts/universal-search | \
            kubeconform -kubernetes-version ${{ matrix.k8s-version }} -summary -

  kind-smoke-test:
    runs-on: ubuntu-latest
    needs: [template, kubeconform]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.1

      - name: Create kind cluster
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: usearch-ci
          node_image: kindest/node:v1.30.0

      - name: Update Helm dependencies
        run: |
          helm dependency update charts/universal-search
        continue-on-error: true

      - name: Install chart (minimal profile)
        run: |
          helm install usearch charts/universal-search \
            -f charts/universal-search/ci/values-test.yaml \
            --wait --timeout 5m --debug

      - name: Run helm test
        run: helm test usearch --timeout 2m

      - name: Show status on failure
        if: failure()
        run: |
          kubectl get pods -A
          kubectl describe pods -l app.kubernetes.io/instance=usearch
          helm status usearch
