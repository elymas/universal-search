# SPEC-DEP-001 — Dependency Audit CI
# REQ-DEP-003, REQ-DEP-004, REQ-DEP-005
#
# Triggers: pull_request + weekly schedule (Monday 04:00 UTC)
# Jobs:
#   govulncheck   - Go vulnerability scanning (call-graph-filtered)
#   pip-audit     - Python vulnerability scanning (per-service matrix)
#   pnpm-audit    - Web vulnerability scanning (high severity blocks merge)
#   hadolint      - Dockerfile linting (warning threshold)
#   license-scan  - License compliance enforcement
#   searxng-digest-check - Ensure SearXNG image is not :latest

name: deps-audit

on:
  pull_request:
  schedule:
    - cron: "0 4 * * 1" # Monday 04:00 UTC (REQ-DEP-003)
  workflow_dispatch:

jobs:
  # ── govulncheck: Go vulnerability scanning ─────────────────────────────────
  # Reports only vulnerabilities reachable via the call graph (not all transitive).
  # HIGH severity → exits non-zero → PR status check fails (REQ-DEP-003).
  govulncheck:
    name: govulncheck (Go)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Install govulncheck (pinned)
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck (fail only on non-stdlib vulnerabilities)
        # Go stdlib vulnerabilities are reported as informational — they are
        # inevitable between Go patch releases (monthly CVE cadence) and a
        # blocking policy would require bumping go.mod on every release.
        # Bumps still happen, just not as a PR blocker. Third-party module
        # vulnerabilities continue to block per REQ-DEP-003.
        run: |
          set +e
          govulncheck -json ./... > /tmp/vuln.json
          STATUS=$?
          set -e

          # Non-stdlib findings (module field on trace[0] != "stdlib") fail.
          NON_STDLIB=$(jq -r '
            select(.finding != null) |
            .finding |
            select(.trace[0].module != null) |
            select(.trace[0].module != "stdlib") |
            "\(.osv) \(.trace[0].module)"
          ' /tmp/vuln.json | sort -u)

          STDLIB=$(jq -r '
            select(.finding != null) |
            .finding |
            select(.trace[0].module == "stdlib") |
            .osv
          ' /tmp/vuln.json | sort -u)

          echo "=== stdlib vulnerabilities (informational) ==="
          echo "${STDLIB:-<none>}"
          echo ""
          echo "=== non-stdlib vulnerabilities (blocking) ==="
          echo "${NON_STDLIB:-<none>}"

          if [ -n "$NON_STDLIB" ]; then
            echo ""
            echo "FAIL: third-party module vulnerability detected."
            exit 1
          fi
          echo ""
          echo "PASS: no blocking vulnerabilities."

  # ── pip-audit: Python vulnerability scanning ────────────────────────────────
  # Runs per-service via matrix. Each service must have pyproject.toml.
  # HIGH severity → exits non-zero (REQ-DEP-003).
  pip-audit:
    name: pip-audit (${{ matrix.service }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service: [researcher, storm, embedder]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install service dev dependencies (pip-audit)
        run: uv sync --group dev --directory services/${{ matrix.service }}

      - name: Run pip-audit for ${{ matrix.service }}
        # Ignored vulnerabilities are documented below. Review quarterly.
        # Clean-bumpable transitive CVEs are fixed in the lockfile, NOT here:
        #   storm/uv.lock — msgpack 1.1.2→1.2.1, ujson 5.12.1→5.13.0,
        #   langsmith 0.8.5→0.9.0 (SPEC-DEP-002 REQ-DEP2-020). Only deps
        #   blocked by an upstream pin (or with no upstream fix) are ignored.
        # ── pip bootstrap (not a service runtime dep) ──
        #   CVE-2026-3219, CVE-2026-6357: pip itself; bootstrap installer risk
        #     only, no service-deliverable impact. Track upstream pip cadence.
        #   PYSEC-2026-196 (pip 26.0.1/26.1.1 → 26.1.2): pip bootstrap, same
        #     class as above; no service-deliverable impact (SPEC-DEP-002).
        # ── transitive deps with patches blocked by upstream pins ──
        #   PYSEC-2026-87 (lxml 6.0.4 → 6.1.0): pinned by FlagEmbedding /
        #     researcher transitive tree; cannot bump without breaking import.
        # ── storm: knowledge-storm 1.1.1 pins these deps ──
        #   CVE-2025-69872 (diskcache 5.6.3): no upstream fix published.
        #   PYSEC-2024-277 (joblib 1.3.2): no upstream fix published.
        #   CVE-2026-35029/35030/42271 + GHSA-69x8-hrgq-fjj8 (litellm 1.80.0
        #     → 1.83.x): knowledge-storm 1.1.1 pins litellm ==1.80.0; upstream
        #     bump required (tracked separately).
        #   PYSEC-2025-217 + CVE-2026-1839 (transformers 4.57.6 → 5.0.0rc3):
        #     5.0 is a pre-release major bump; awaiting stable + storm compat
        #     validation.
        # ── SPEC-DEP-002 (REQ-DEP2-030/040/050): newly-surfaced CVE batch ──
        #   aiohttp 3.13.5 → 3.14.0/3.14.1 (CVE-2026-34993, -47265, -50269,
        #     -54273..-54280): transitively pinned by litellm 1.80.0
        #     (knowledge-storm 1.1.1); also present in embedder/researcher via
        #     the same upstream tree. Unblocks when knowledge-storm/litellm
        #     ship aiohttp >= 3.14.1.
        #   CVE-2026-49468 (litellm 1.80.0 → 1.84.0): the 1.84.0-only fix;
        #     knowledge-storm 1.1.1 pins litellm ==1.80.0. Unblocks with an
        #     upstream knowledge-storm release loosening the litellm pin.
        #   CVE-2026-54282/-54283 (starlette 1.1.0 → 1.3.0/1.3.1): pinned via
        #     fastapi 0.136.1 → starlette 1.1.0. Unblocks when fastapi pins
        #     starlette >= 1.3.1.
        #   CVE-2025-3000 (torch 2.12.0): NO upstream fix released. Accepted
        #     exception, retained until a fixed torch release ships
        #     (REQ-DEP2-050; storm + embedder).
        #   GHSA-6v7p-g79w-8964 (msgpack 1.1.2 → 1.2.1): fixed in storm/uv.lock
        #     by lockfile bump; ignored only for embedder/researcher, whose
        #     transitive versions resolve from the workspace root lock
        #     (services/{embedder,researcher} are uv workspace members; a
        #     surgical bump requires regenerating the shared root lock and is
        #     deferred to avoid cross-service churn).
        #   GHSA-gr75-jv2w-4656 (langchain 1.3.2 → 1.3.9): researcher only;
        #     langchain is capped at <1.4 by ragas 0.3.1 (deepeval~=1.0 tree).
        #     Unblocks with a deepeval/ragas release allowing langchain 1.3.9+.
        #   CVE-2026-6587 (ragas 0.3.1): researcher only; no in-range upstream
        #     fix (ragas 0.4.x breaks the deepeval~=1.0 compatibility pin).
        run: |
          uv run --directory services/${{ matrix.service }} pip-audit \
            --ignore-vuln CVE-2026-3219 \
            --ignore-vuln CVE-2026-6357 \
            --ignore-vuln PYSEC-2026-196 \
            --ignore-vuln PYSEC-2026-87 \
            --ignore-vuln CVE-2025-69872 \
            --ignore-vuln PYSEC-2024-277 \
            --ignore-vuln CVE-2026-35029 \
            --ignore-vuln CVE-2026-35030 \
            --ignore-vuln CVE-2026-42271 \
            --ignore-vuln GHSA-69x8-hrgq-fjj8 \
            --ignore-vuln CVE-2026-49468 \
            --ignore-vuln PYSEC-2025-217 \
            --ignore-vuln CVE-2026-1839 \
            --ignore-vuln CVE-2026-34993 \
            --ignore-vuln CVE-2026-47265 \
            --ignore-vuln CVE-2026-50269 \
            --ignore-vuln CVE-2026-54273 \
            --ignore-vuln CVE-2026-54274 \
            --ignore-vuln CVE-2026-54275 \
            --ignore-vuln CVE-2026-54276 \
            --ignore-vuln CVE-2026-54277 \
            --ignore-vuln CVE-2026-54278 \
            --ignore-vuln CVE-2026-54279 \
            --ignore-vuln CVE-2026-54280 \
            --ignore-vuln CVE-2026-54282 \
            --ignore-vuln CVE-2026-54283 \
            --ignore-vuln CVE-2025-3000 \
            --ignore-vuln GHSA-6v7p-g79w-8964 \
            --ignore-vuln GHSA-gr75-jv2w-4656 \
            --ignore-vuln CVE-2026-6587

  # ── pnpm-audit: Web vulnerability scanning ─────────────────────────────────
  # --audit-level=high: only HIGH/CRITICAL findings fail the job (REQ-DEP-003).
  pnpm-audit:
    name: pnpm audit (web)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: "web/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: "web/pnpm-lock.yaml"

      - name: Install web dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: pnpm audit (high severity)
        run: pnpm --dir web audit --audit-level=high
        continue-on-error: false

  # ── hadolint: Dockerfile linting ────────────────────────────────────────────
  # warning threshold means the job fails on warnings or above (REQ-DEP-003).
  hadolint:
    name: hadolint (Dockerfiles)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          dockerfile: "**/Dockerfile"
          failure-threshold: warning

  # ── license-scan: License compliance enforcement ────────────────────────────
  # Generates docs/licenses/{go,python,web}.txt and runs allowlist check.
  # REQ-DEP-004: any license outside the allowlist → exit 1 → blocks merge.
  license-scan:
    name: license-scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - uses: astral-sh/setup-uv@v3

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: "web/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: "web/pnpm-lock.yaml"

      - name: Create docs/licenses directory
        run: mkdir -p docs/licenses

      - name: Generate Go license report
        run: |
          go install github.com/google/go-licenses@v1.6.0
          go-licenses report ./... > docs/licenses/go.txt 2>/dev/null || true

      - name: Generate Python license report
        run: |
          : > docs/licenses/python.txt
          for svc in services/*/; do
            [ -f "${svc}pyproject.toml" ] || continue
            svcname=$(basename "$svc")
            echo "# === ${svcname} ===" >> docs/licenses/python.txt
            # Sync service (pip-licenses is in the dev group)
            uv sync --group dev --directory "${svc}" >/dev/null 2>&1 || true
            uv run --directory "${svc}" --with pip-licenses==5.0.0 \
              pip-licenses --format=plain 2>/dev/null >> docs/licenses/python.txt || true
            echo "" >> docs/licenses/python.txt
          done

      - name: Generate Web license report
        run: |
          pnpm --dir web install --frozen-lockfile
          npm install -g license-checker@25.0.1
          license-checker --start web --excludePrivatePackages \
            --out docs/licenses/web.txt 2>/dev/null || true

      - name: Check license allowlist
        run: bash scripts/check-license-allowlist.sh

      # On scheduled main-branch runs, commit the generated license files
      - name: Commit license files (scheduled runs only)
        if: github.event_name == 'schedule' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/licenses/
          git diff --staged --quiet || git commit -m "chore(deps): regenerate license reports [skip ci]"
          git push

  # ── searxng-digest-check: Ensure SearXNG image is not :latest ───────────────
  # REQ-DEP-005: fails if SearXNG image is referenced by :latest tag.
  searxng-digest-check:
    name: searxng digest pin
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Assert SearXNG image is digest-pinned
        run: |
          # Extract the SearXNG image line from compose file
          line=$(grep -E '^\s*image:\s*searxng/searxng' deploy/docker-compose.yml || true)
          if [ -z "$line" ]; then
            echo "ERROR: No searxng/searxng image line found in deploy/docker-compose.yml"
            exit 1
          fi
          # Must match dated tag (YYYY.MM.DD-...) or sha256 digest
          if echo "$line" | grep -Eq '(@sha256:[a-f0-9]{64}|:[0-9]{4}\.[0-9]{2}\.[0-9]{2}[-a-f0-9]*)'; then
            echo "OK: SearXNG image is properly pinned: $line"
          else
            echo "FAIL: SearXNG must be digest-pinned (dated tag or sha256). Got: $line"
            echo "See docs/dependencies.md §SearXNG digest pin procedure for instructions."
            exit 1
          fi
          # Ensure :latest is absent
          if echo "$line" | grep -q ':latest'; then
            echo "FAIL: SearXNG image must not use :latest"
            exit 1
          fi
