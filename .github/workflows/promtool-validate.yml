# SPEC-EVAL-002: CI gate validating Prometheus recording rules, alert rules,
# their unit tests, and the Alertmanager config. promtool/amtool are not
# expected on developer machines, so this validation is CI-only.
name: promtool-validate

on:
  push:
    paths:
      - "deploy/prometheus/**"
      - "deploy/alertmanager/**"
      - ".github/workflows/promtool-validate.yml"
  pull_request:
    paths:
      - "deploy/prometheus/**"
      - "deploy/alertmanager/**"
      - ".github/workflows/promtool-validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install promtool (Prometheus)
        run: |
          PROM_VERSION="2.54.1"
          curl -sSL -o prometheus.tar.gz \
            "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz"
          tar -xzf prometheus.tar.gz
          sudo install "prometheus-${PROM_VERSION}.linux-amd64/promtool" /usr/local/bin/promtool
          promtool --version

      - name: Install amtool (Alertmanager)
        run: |
          AM_VERSION="0.27.0"
          curl -sSL -o alertmanager.tar.gz \
            "https://github.com/prometheus/alertmanager/releases/download/v${AM_VERSION}/alertmanager-${AM_VERSION}.linux-amd64.tar.gz"
          tar -xzf alertmanager.tar.gz
          sudo install "alertmanager-${AM_VERSION}.linux-amd64/amtool" /usr/local/bin/amtool
          amtool --version

      - name: Check recording rules + alert rules
        run: |
          promtool check rules \
            deploy/prometheus/recording-rules.yml \
            deploy/prometheus/alerts.yml

      - name: Run recording-rule unit tests
        run: promtool test rules deploy/prometheus/recording-rules-test.yml

      - name: Run alert-rule unit tests
        run: promtool test rules deploy/prometheus/alerts-test.yml

      - name: Check Alertmanager config
        run: amtool check-config deploy/alertmanager/alertmanager.yml

      - name: Check Prometheus config
        # rule_files in prometheus.yml are relative, so run from the prometheus
        # dir so promtool resolves recording-rules.yml / alerts.yml correctly.
        working-directory: deploy/prometheus
        run: promtool check config prometheus.yml
