name: Build Images

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

env:
  REGISTRY: ghcr.io
  ORG: elymas

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-go-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: usearch-api
            dockerfile: deploy/Dockerfile.usearch-api
          - name: usearch-mcp
            dockerfile: deploy/Dockerfile.usearch-mcp
          - name: usearch-migrate
            dockerfile: deploy/Dockerfile.usearch-migrate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image.name }}@${{ steps.meta.outputs.digest }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image.name }}@${{ steps.meta.outputs.digest }}
          format: spdx
          output-file: sbom-${{ matrix.image.name }}.spdx.json

      - name: Attach SBOM to image
        run: |
          cosign attach sbom --sbom sbom-${{ matrix.image.name }}.spdx.json \
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image.name }}@${{ steps.meta.outputs.digest }}

  build-python-sidecars:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sidecar: [researcher, embedder, tokenizer-ko, storm, koreanews]
        exclude:
          # embedder: amd64 only due to PyTorch + CUDA (NFR-DEPLOY-007)
          - sidecar: embedder
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.sidecar }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.sidecar }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image (keyless)
        uses: sigstore/cosign-installer@v3
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.sidecar }}@${{ steps.meta.outputs.digest }}

  build-embedder-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/embedder
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      # embedder: amd64 ONLY (NFR-DEPLOY-007 — PyTorch + CUDA dependency)
      - name: Build and push (amd64 only)
        uses: docker/build-push-action@v6
        with:
          context: ./services/embedder
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image (keyless)
        uses: sigstore/cosign-installer@v3
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.ORG }}/embedder@${{ steps.meta.outputs.digest }}
