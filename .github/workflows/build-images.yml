# SPEC-DEPLOY-001 REQ-DEPLOY-018 / NFR-DEPLOY-007 — image BUILD-VERIFY.
# Builds the 3 Go images (usearch-api, usearch-mcp, usearch-migrate) for
# linux/amd64 and verifies the build succeeds. The 5 Python sidecar images are
# built from services/*/Dockerfile elsewhere and only REFERENCED by the chart.
#
# DEFERRED to fast-follow (NOT in this workflow):
#   - cosign keyless signing (owned by SPEC-REL-001 release workflow)
#   - SBOM (syft SPDX) + SLSA L2 provenance
#   - arm64 multi-arch (V1.1)
#   - registry PUSH (blocked on unresolved ghcr.io/<org> placeholder)
# V1 = build-verify only (load image into the runner's docker, no push).
name: build-images

on:
  pull_request:
    paths:
      - "deploy/Dockerfile.usearch-*"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/build-images.yml"
  push:
    branches: [main]
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.image }} (amd64)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: usearch-api
            dockerfile: deploy/Dockerfile.usearch-api
          - image: usearch-mcp
            dockerfile: deploy/Dockerfile.usearch-mcp
          - image: usearch-migrate
            dockerfile: deploy/Dockerfile.usearch-migrate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image }} (linux/amd64, verify only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ matrix.image }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image is non-root + amd64
        run: |
          ARCH=$(docker image inspect "${{ matrix.image }}:ci" --format '{{.Architecture}}')
          USER=$(docker image inspect "${{ matrix.image }}:ci" --format '{{.Config.User}}')
          echo "arch=$ARCH user=$USER"
          test "$ARCH" = "amd64"
          test "$USER" = "65532:65532" || test "$USER" = "65532"
