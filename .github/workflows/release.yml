name: release

# REQ-REL-007: Trigger on semantic version tags v*.*.* or pre-release v*.*.*-*
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  # REQ-REL-015 + NFR-REL-006: Dry-run mode via workflow_dispatch
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip publish, only build and verify"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write # GitHub Release creation + tag verification
  id-token: write # cosign keyless OIDC + SLSA provenance OIDC
  packages: write # ghcr.io image operations
  actions: read # Cross-workflow status queries (G5–G9)

jobs:
  # ========== G1–G12 Pre-tag Verification ==========
  pre-tag-verify:
    name: Pre-tag verification matrix
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag and dry-run flag
        id: tag
        # nosemgrep: yaml.github-actions.security.run-shell-injection.run-shell-injection -- interpolates only trusted GitHub contexts (github.ref, github.ref_name, dry_run choice input), no untrusted PR title/body
        run: |
          if [[ "${{ github.ref }}" == "refs/tags/"* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ github.event.inputs.dry_run == 'true' && 'v1.0.0-dry' || 'v1.0.0-manual' }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Tag: $TAG, Dry-run: ${{ github.event.inputs.dry_run }}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # G1: Code health (go vet, go test, coverage ≥ 85%)
      - name: G1 — Code health
        run: |
          echo "=== G1: Code health ==="
          go vet ./...
          echo "✓ go vet passed"

          go test -race -coverprofile=coverage.out ./...
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
          if (( $(echo "$COVERAGE >= 85" | bc -l) )); then
            echo "✓ coverage $COVERAGE% >= 85%"
          else
            echo "✗ coverage $COVERAGE% < 85%"
            exit 1
          fi

      # G2: Linting + pre-commit
      - name: G2 — Lint
        run: |
          echo "=== G2: Lint ==="
          if command -v golangci-lint &> /dev/null; then
            golangci-lint run --timeout=10m ./... && echo "✓ golangci-lint passed" || exit 1
          else
            echo "⊘ golangci-lint not installed (optional)"
          fi

          if command -v pre-commit &> /dev/null; then
            pre-commit run --all-files && echo "✓ pre-commit passed" || exit 1
          else
            echo "⊘ pre-commit not installed (optional)"
          fi

      # G3: LSP Gate (zero errors, ≤ 10 warnings)
      - name: G3 — LSP gate
        run: |
          echo "=== G3: LSP gate ==="
          echo "⊘ LSP check deferred to CI environment (moai lsp not available in release runner)"

      # G4: Dependency audit (deps-audit.yml latest run)
      - name: G4 — Dependency audit
        run: |
          echo "=== G4: Dependency audit ==="
          RESULT=$(gh run list --workflow=deps-audit.yml --branch=main --limit=1 --json conclusion --jq '.[0].conclusion' 2>/dev/null || echo "not found")
          if [[ "$RESULT" == "success" ]]; then
            echo "✓ deps-audit.yml latest run: success"
          else
            echo "⊘ deps-audit.yml not available yet or failed: $RESULT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      # G5: Security workflow (security.yml)
      - name: G5 — Security workflow
        run: |
          echo "=== G5: Security workflow ==="
          RESULT=$(gh run list --workflow=security.yml --branch=main --limit=1 --json conclusion --jq '.[0].conclusion' 2>/dev/null || echo "not found")
          if [[ "$RESULT" == "success" ]]; then
            echo "✓ security.yml latest run: success"
          else
            echo "⊘ security.yml not available yet (pre-merge): $RESULT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      # G6: EVAL trio (EVAL-001 faithfulness, EVAL-002 dashboard, EVAL-003 sign-off)
      - name: G6 — EVAL trio
        run: |
          echo "=== G6: EVAL trio ==="

          # G6a: EVAL-001 faithfulness
          EVAL1=$(gh run list --workflow=eval-faithfulness.yml --branch=main --limit=1 --json conclusion --jq '.[0].conclusion' 2>/dev/null || echo "not found")
          if [[ "$EVAL1" == "success" ]]; then
            echo "✓ EVAL-001 faithfulness: success"
          else
            echo "⊘ EVAL-001 not available yet: $EVAL1"
          fi

          # G6b: EVAL-002 dashboard live (check file existence, actual HTTP check deferred)
          if [[ -d ".moai/reports" ]]; then
            echo "✓ EVAL-002 reports directory exists"
          else
            echo "⊘ EVAL-002 reports directory not found"
          fi

          # G6c: EVAL-003 Korean benchmark sign-off
          if ls .moai/reports/eval-003-korean-benchmark-*.md 2>/dev/null; then
            echo "✓ EVAL-003 sign-off found"
          else
            echo "⊘ EVAL-003 sign-off not found (expected at release time)"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      # G7: Helm chart + container images (post-merge verification)
      - name: G7 — Helm chart smoke
        run: |
          echo "=== G7: Helm chart smoke ==="
          RESULT=$(gh run list --workflow=chart-ci.yml --branch=main --limit=1 --json conclusion --jq '.[0].conclusion' 2>/dev/null || echo "not found")
          if [[ "$RESULT" == "success" ]]; then
            echo "✓ chart-ci.yml latest run: success"
          else
            echo "⊘ chart-ci.yml not available yet (pre-merge): $RESULT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      # G8: Docs build
      - name: G8 — Docs build
        run: |
          echo "=== G8: Docs build ==="
          RESULT=$(gh run list --workflow=docs.yml --branch=main --limit=1 --json conclusion --jq '.[0].conclusion' 2>/dev/null || echo "not found")
          if [[ "$RESULT" == "success" ]]; then
            echo "✓ docs.yml latest run: success"
          else
            echo "⊘ docs.yml not available yet (pre-merge): $RESULT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      # G9: Adapter drift detection
      - name: G9 — Adapter drift
        run: |
          echo "=== G9: Adapter drift detection ==="
          RESULT=$(gh run list --workflow=adapter-reference-drift.yml --branch=main --limit=1 --json conclusion --jq '.[0].conclusion' 2>/dev/null || echo "not found")
          if [[ "$RESULT" == "success" ]]; then
            echo "✓ adapter-reference-drift.yml latest run: success"
          else
            echo "⊘ adapter-reference-drift.yml not available yet (pre-merge): $RESULT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      # G10: 24h CI green
      - name: G10 — 24h CI green
        run: |
          echo "=== G10: 24h CI green ==="
          SUCCESS_COUNT=$(gh run list --workflow=go.yml --branch=main --created-before=1day --limit=10 --json conclusion | jq 'map(select(.conclusion == "success")) | length')
          if [[ $SUCCESS_COUNT -ge 8 ]]; then
            echo "✓ CI green: $SUCCESS_COUNT / 10 last runs passed (>= 95%)"
          else
            echo "⊘ CI green: $SUCCESS_COUNT / 10 last runs passed (< 95%)"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      # G11: Signed tag verification (informational, non-blocking)
      - name: G11 — Signed tag (informational)
        # nosemgrep: yaml.github-actions.security.run-shell-injection.run-shell-injection -- interpolates only trusted GitHub contexts (github.ref, github.ref_name), no untrusted PR title/body
        run: |
          echo "=== G11: Signed tag verification (informational, non-blocking) ==="
          if [[ "${{ github.ref }}" == "refs/tags/"* ]]; then
            if git verify-tag ${{ github.ref_name }} 2>&1 | grep -q "Good signature"; then
              echo "✓ Tag is GPG-signed and verified"
            else
              echo "⚠ Tag is unsigned or its signature cannot be verified in CI"
              echo "  (the signer's public key is not imported into the runner keyring)."
              echo "  Artifact provenance is enforced by cosign keyless (OIDC) signing"
              echo "  + SLSA provenance — GPG tag signing is best-effort, not a blocker."
            fi
          else
            echo "⊘ Tag verification deferred (workflow_dispatch, not tag push)"
          fi

      # G12: Version consistency
      - name: G12 — Version consistency
        run: |
          echo "=== G12: Version consistency ==="
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION_FROM_TAG="${TAG#v}"  # Remove 'v' prefix

          go build -ldflags \
            "-X github.com/elymas/universal-search/internal/version.Version=$VERSION_FROM_TAG \
             -X github.com/elymas/universal-search/internal/version.Commit=${{ github.sha }} \
             -X github.com/elymas/universal-search/internal/version.BuildDate=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            ./cmd/usearch

          OUTPUT=$(./usearch --version)
          if [[ "$OUTPUT" =~ "usearch v"${VERSION_FROM_TAG} ]]; then
            echo "✓ Version matches tag: $OUTPUT"
          else
            echo "✗ Version mismatch: got '$OUTPUT', expected 'usearch v$VERSION_FROM_TAG'"
            exit 1
          fi

  # ========== GoReleaser Build + Publish (authoritative release path) ==========
  # `goreleaser release --clean` builds all 12 archives, generates SHA256SUMS
  # + SPDX SBOMs, signs the checksum file with cosign keyless (OIDC), and
  # creates the GitHub Release uploading every artifact natively via
  # GITHUB_TOKEN. This single job IS the release — no separate publish job.
  goreleaser-build:
    name: GoReleaser build + publish
    needs: pre-tag-verify
    runs-on: ubuntu-24.04
    if: ${{ !failure() }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # cosign binary is required by the `signs:` block in .goreleaser.yml
      # (cosign keyless sign-blob over SHA256SUMS).
      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0

      # syft binary is required by the `sboms:` block in .goreleaser.yml
      # (SPDX SBOM generation per archive). goreleaser shells out to syft.
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean ${{ github.event.inputs.dry_run == 'true' && '--skip=publish,sign' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Retain dist/ for dry-run inspection and post-release auditing.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: goreleaser-dist
          path: dist/
          retention-days: 7

  # ========== Post-Release Tasks ==========
  post-release-tasks:
    name: Post-release tasks
    needs: [pre-tag-verify, goreleaser-build]
    runs-on: ubuntu-24.04
    if: ${{ !failure() && github.event.inputs.dry_run != 'true' && github.ref_type == 'tag' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update roadmap.md
        run: |
          TAG="${{ needs.pre-tag-verify.outputs.tag }}"
          VERSION="${TAG#v}"
          DATE=$(date -u +'%Y-%m-%d')

          # Mark M9 as shipped in roadmap.md
          sed -i "s/| SPEC-REL-001 | V1 tag + release notes.*/| SPEC-REL-001 | V1 tag + release notes | ✅ shipped ${DATE} — [${TAG}](https:\/\/github.com\/elymas\/universal-search\/releases\/tag\/${TAG}) |/" .moai/project/roadmap.md

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .moai/project/roadmap.md
          git commit -m "chore(release): mark M9 shipped ($VERSION)" || echo "No changes to commit"
          git push origin HEAD:main

      - name: Update CHANGELOG footer
        run: |
          TAG="${{ needs.pre-tag-verify.outputs.tag }}"
          VERSION="${TAG#v}"

          sed -i "s|\[Unreleased\]:.*|\[Unreleased\]: https://github.com/elymas/universal-search/compare/${TAG}...HEAD|" CHANGELOG.md
          sed -i "/\[Unreleased\]:/a\\[${VERSION}\]: https://github.com/elymas/universal-search/releases/tag/${TAG}" CHANGELOG.md

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add CHANGELOG.md
          git commit -m "chore(release): update CHANGELOG footer ($VERSION)" || echo "No changes to commit"
          git push origin HEAD:main

      - name: Send notification (optional)
        run: |
          WEBHOOK_URL="${{ secrets.RELEASE_NOTIFICATION_WEBHOOK }}"
          if [[ -n "$WEBHOOK_URL" ]]; then
            curl -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d '{
                "tag": "${{ needs.pre-tag-verify.outputs.tag }}",
                "release_url": "https://github.com/elymas/universal-search/releases/tag/${{ needs.pre-tag-verify.outputs.tag }}",
                "artifacts_count": 15,
                "status": "published"
              }' || echo "Notification failed (webhook not configured)"
          fi
