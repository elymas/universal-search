# SPEC-SEC-001 — Security CI (secret scanning + container CVE scan)
#
# Separate from deps-audit.yml (SPEC-DEP-001) which owns govulncheck /
# pip-audit / pnpm-audit / hadolint / license-scan. This workflow owns the
# NEW security stage: gitleaks (secret scanning) + Trivy (container image +
# Dockerfile CVE scan). gosec + semgrep jobs are added by T07.
#
# Budget: NFR-SEC-001 — median PR completes within 5 min wall-clock; total
# security CI (this + deps-audit.yml) parallel wall-clock <= 15 min.

name: security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1" # Monday 04:00 UTC (aligns with deps-audit.yml)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── gitleaks: secret scanning (REQ-SEC-004) ─────────────────────────────────
  # First job. Scans the full git history on push/schedule, and the PR diff on
  # pull_request. Findings not in .gitleaks.toml allowlist fail the job.
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required so the scan covers historical commits, not
          # just the PR tip (REQ-SEC-004 / REQ-SEC-005 historical-secret check).
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # gitleaks-action v2 requires GITHUB_TOKEN to scan pull requests.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required for org-level usage; unset for
          # this repo (free for individual + public use).
          GITLEAKS_CONFIG: .gitleaks.toml
          # Scan the entire history; --redact prevents secret echo in logs.
          GITLEAKS_ENABLE_COMMENTS: "false"

  # ── trivy: container image + Dockerfile CVE scan (REQ-SEC-001, 002) ─────────
  # Scans every Dockerfile (config/misconfig) and every built service image.
  # CRITICAL/HIGH (CVSS >= 7.0) blocks merge; UNFIXED is informational.
  trivy-config:
    name: trivy (Dockerfile config)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Trivy config scan (Dockerfiles + IaC)
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: config
          scan-ref: .
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          # Misconfig + secret detection on Dockerfiles and compose files.
          hide-progress: "true"

  trivy-image:
    name: trivy (image — ${{ matrix.service }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service: [researcher, storm, embedder, tokenizer-ko, koreanews]
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service }} image
        run: |
          docker build -t usearch/${{ matrix.service }}:ci \
            -f services/${{ matrix.service }}/Dockerfile services/${{ matrix.service }}

      - name: Trivy image scan (${{ matrix.service }})
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: image
          image-ref: usearch/${{ matrix.service }}:ci
          # CVSS >= 7.0 (HIGH/CRITICAL) blocks; ignore-unfixed makes UNFIXED
          # informational (REQ-SEC-003 — tracked in vuln-exceptions.yaml).
          severity: "CRITICAL,HIGH"
          ignore-unfixed: "true"
          exit-code: "1"
          hide-progress: "true"

      - name: Trivy SBOM (CycloneDX) for ${{ matrix.service }}
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: image
          image-ref: usearch/${{ matrix.service }}:ci
          format: cyclonedx
          output: "sbom-${{ matrix.service }}.cdx.json"
          hide-progress: "true"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: "sbom-${{ matrix.service }}.cdx.json"
          if-no-files-found: warn

  # ── vuln-exceptions: UNFIXED CVE deadline enforcement (REQ-SEC-003) ─────────
  # Fails if any exception's review_deadline has passed without renewal.
  vuln-exceptions:
    name: vuln-exceptions (deadline check)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Validate vuln-exceptions.yaml + enforce 90-day deadlines
        run: bash scripts/check-vuln-exceptions.sh

  # ── gosec: Go static analysis (REQ-SEC-010) ────────────────────────────────
  # HIGH severity blocks merge; MEDIUM/LOW are informational. Config in
  # .gosec.yml excludes tests/testdata. #nosec suppressions require a reason.
  gosec:
    name: gosec (static analysis)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run gosec (HIGH-severity gate)
        uses: securego/gosec@v2.21.4
        with:
          # -severity high : only HIGH findings set a non-zero exit (block).
          # -conf          : project config (exclusions, #nosec audit).
          # MEDIUM/LOW still print as annotations but do not fail the job.
          args: "-severity high -confidence medium -conf .gosec.yml ./..."

  # ── semgrep: pattern-based SAST (REQ-SEC-010) ───────────────────────────────
  # Rule sets p/golang + p/owasp-top-ten + p/jwt. New findings (outside
  # .semgrepignore) block the merge.
  semgrep:
    name: semgrep (SAST)
    runs-on: ubuntu-24.04
    container:
      image: semgrep/semgrep:1.85.0
    steps:
      - uses: actions/checkout@v4

      - name: Run semgrep
        run: semgrep ci --config p/golang --config p/owasp-top-ten --config p/jwt
        env:
          SEMGREP_RULES: "p/golang p/owasp-top-ten p/jwt"

  # ── tls-grep: forbid legacy TLS versions (REQ-SEC-012) ──────────────────────
  # Grep-asserts no tls.VersionTLS10/11 literal in non-test Go source. TLS 1.2
  # is the enforced minimum (see internal/access/phase4_tls.go).
  tls-grep:
    name: tls-grep (no TLS 1.0/1.1)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Assert no TLS 1.0/1.1 literals in non-test Go
        run: |
          if grep -rn --include='*.go' --exclude='*_test.go' \
              -E 'tls\.VersionTLS1[01]\b' internal/ cmd/ ; then
            echo "::error::Legacy TLS version (1.0/1.1) literal found — REQ-SEC-012 requires TLS 1.2 minimum"
            exit 1
          fi
          echo "OK: no tls.VersionTLS10/11 in non-test Go source"

  # ── secret-grep: forbid secret-named vars in log/error paths (REQ-SEC-018) ──
  # Asserts no fmt/log formatting of *_SECRET / *_KEY / *_TOKEN / *_PASSWORD
  # variables in non-test Go source.
  secret-grep:
    name: secret-grep (no secrets in logs)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Assert no secret-named vars formatted into log/error paths
        run: bash scripts/check-no-secret-logs.sh
