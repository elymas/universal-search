name: Web CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Next.js typecheck + lint + build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        # SPEC-WEB-001 REQ-WEB-070: regression observed — CI resolved react@18.3.1
        # despite web/pnpm-lock.yaml pinning react@19.2.5, breaking tsc type
        # resolution (TS2307/TS7016 for react, react/jsx-runtime, vitest,
        # @testing-library/*). Root cause: the repo-root pnpm-workspace.yaml makes
        # `pnpm --dir web install` resolve the WORKSPACE (root react@18) into the
        # repo-root node_modules and never create web/node_modules, so web's tsc
        # walks up to root react@18. --ignore-workspace forces a standalone web
        # install from web/pnpm-lock.yaml (react@19.2.5) into web/node_modules.
        run: pnpm --dir web install --frozen-lockfile --ignore-workspace

      - name: Type check
        run: pnpm --dir web typecheck

      - name: Lint
        run: pnpm --dir web lint

      - name: Build
        run: pnpm --dir web build
