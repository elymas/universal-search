name: Web CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Next.js typecheck + lint + build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        # SPEC-WEB-001 REQ-WEB-070: regression observed — CI resolved react@18.3.1
        # despite web/pnpm-lock.yaml pinning react@19.2.5, breaking tsc type
        # resolution (TS2307/TS7016 for react, react/jsx-runtime, vitest,
        # @testing-library/*). --frozen-lockfile forbids re-resolution so the
        # react@19 pin is honored. Lockfile verified in sync (frozen+offline OK).
        run: pnpm --dir web install --frozen-lockfile

      - name: Type check
        run: pnpm --dir web typecheck

      - name: Lint
        run: pnpm --dir web lint

      - name: Build
        run: pnpm --dir web build
