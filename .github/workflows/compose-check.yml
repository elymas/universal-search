name: Compose Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compose-check:
    name: docker compose config validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy env example
        run: cp .env.example .env

      - name: Validate compose config (syntax check)
        run: docker compose -f deploy/docker-compose.yml config -q

      - name: Echo compose OK
        run: echo "compose config OK"
