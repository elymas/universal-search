name: Pre-commit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    name: pre-commit run --all-files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go (for go-fmt/go-imports hooks)
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Install goimports (required by go-imports pre-commit hook)
        run: |
          go install golang.org/x/tools/cmd/goimports@v0.27.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up pnpm (required by eslint pre-commit hook)
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js (required by pnpm + eslint pre-commit hook)
        uses: actions/setup-node@v4
        with:
          node-version-file: "web/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: "web/pnpm-lock.yaml"

      - name: Install web dependencies (required so `pnpm exec eslint` resolves)
        run: pnpm --dir web install --frozen-lockfile

      - name: Install hadolint binary (required by hadolint pre-commit hook)
        run: |
          sudo curl -sSL -o /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint
          hadolint --version

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files
