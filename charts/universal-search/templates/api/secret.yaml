{{/*
Secret resource for usearch-api - only created when secrets.backend == "values"
Tier 1 (dev/CI ONLY). Production MUST use tier 2 (existingSecret) or tier 3 (ESO).
*/}}
{{- if and .Values.usearch.api.enabled (eq .Values.secrets.backend "values") }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "universal-search.componentFullname" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "api") }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "universal-search.componentLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "api") | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $_ := .Values.usearch.api.secretEnv }}
  {{ $key }}: {{ index $.Values.secretsValues (lower $key | replace "_" "") | default "" }}
  {{- end }}
{{- end }}
