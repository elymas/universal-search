{{/* SPEC-DEPLOY-001 — usearch-api ServiceMonitor (REQ-DEPLOY-019, D6).
Emitted ONLY when the Prometheus Operator CRD is present. When absent, the chart
falls back to pod-annotation scrape hints (see _helpers usearch.scrapeAnnotations,
applied on the Deployment pod template). Operator-optional by design. */}}
{{- $c := "api" }}
{{- $svc := .Values.usearch.api }}
{{- if and $svc.enabled .Values.observability.serviceMonitor.enabled }}
{{- if .Capabilities.APIVersions.Has "monitoring.coreos.com/v1" }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "usearch.componentName" (dict "root" . "component" $c) }}
  labels:
    {{- include "usearch.componentLabels" (dict "root" . "component" $c) | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "usearch.componentSelectorLabels" (dict "root" . "component" $c) | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.observability.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.observability.serviceMonitor.scrapeTimeout }}
{{- end }}
{{- end }}
