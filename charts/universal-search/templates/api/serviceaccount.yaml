{{/* SPEC-DEPLOY-001 — usearch-api ServiceAccount (REQ-DEPLOY-009). */}}
{{- if and .Values.usearch.api.enabled .Values.usearch.api.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "usearch.serviceAccountName" (dict "root" . "component" "api" "svc" .Values.usearch.api) }}
  labels:
    {{- include "usearch.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
{{- end }}
