{{- if and .Values.usearch.api.enabled .Values.usearch.api.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "universal-search.serviceAccountName" (dict "Chart" .Chart "Release" .Release "Values" .Values "serviceAccount" .Values.usearch.api.serviceAccount "component" "api") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "universal-search.componentLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "api") | nindent 4 }}
  {{- with .Values.usearch.api.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
