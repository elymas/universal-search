{{/*
SPEC-DEPLOY-001 — chart-managed Secret (tier 1: secrets.backend=values only).
Tier 2 (existingSecret) references an operator-created Secret instead; tier 3
(externalSecrets) is install-blocked (see usearch.assertSecretBackend).
REQ-DEPLOY-008 / REQ-DEPLOY-016, D5.
*/}}
{{- include "usearch.assertSecretBackend" . -}}
{{- if eq .Values.secrets.backend "values" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "usearch.fullname" . }}-secrets
  labels:
    {{- include "usearch.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets.values }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
