{{/* SPEC-DEPLOY-001 — tokenizer-ko Python sidecar (REQ-DEPLOY-011). */}}
{{- $sidecar := index .Values "tokenizer-ko" }}
{{- if $sidecar.enabled }}
{{- $c := "tokenizer-ko" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "usearch.componentName" (dict "root" . "component" $c) }}
  labels:
    {{- include "usearch.componentLabels" (dict "root" . "component" $c) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "usearch.componentSelectorLabels" (dict "root" . "component" $c) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "usearch.componentSelectorLabels" (dict "root" . "component" $c) | nindent 8 }}
    spec:
      {{- include "usearch.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: {{ $c }}
          image: {{ include "usearch.image" (dict "root" . "image" $sidecar.image) }}
          imagePullPolicy: {{ $sidecar.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $sidecar.service.port }}
          env:
            - name: TOKENIZER_KO_PORT
              value: {{ $sidecar.service.port | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          {{- with $sidecar.resources }}
          resources: {{ toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "usearch.componentName" (dict "root" . "component" $c) }}
  labels:
    {{- include "usearch.componentLabels" (dict "root" . "component" $c) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "usearch.componentSelectorLabels" (dict "root" . "component" $c) | nindent 4 }}
  ports:
    - name: http
      port: {{ $sidecar.service.port }}
      targetPort: http
{{- end }}
