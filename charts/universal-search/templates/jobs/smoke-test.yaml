{{/*
Helm test hook — verifies /healthz and /metrics endpoints after install.
Invoked via: helm test <release-name>
*/}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "universal-search.fullname" . }}-smoke-test
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "universal-search.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: healthz-test
      image: curlimages/curl:8.12.1
      command:
        - /bin/sh
        - -c
        - |
          echo "Testing /healthz endpoint..."
          curl -fsS http://{{ include "universal-search.componentFullname" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "api") }}:{{ .Values.usearch.api.service.port }}/healthz
          echo ""
          echo "Testing /metrics endpoint..."
          curl -fsS http://{{ include "universal-search.componentFullname" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "api") }}:{{ .Values.usearch.api.env.USEARCH_ADMIN_PORT | default 9090 }}/metrics
          echo ""
          echo "All smoke tests passed!"
