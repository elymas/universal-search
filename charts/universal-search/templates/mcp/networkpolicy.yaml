{{/* SPEC-DEPLOY-001 — usearch-mcp NetworkPolicy (REQ-DEPLOY-010, D9).
mcp is cluster-internal: ingress only from intra-chart pods (no ingress-nginx).
No-op without a CNI policy controller (NOTES.txt). */}}
{{- $c := "mcp" }}
{{- $svc := .Values.usearch.mcp }}
{{- if and $svc.enabled $svc.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "usearch.componentName" (dict "root" . "component" $c) }}
  labels:
    {{- include "usearch.componentLabels" (dict "root" . "component" $c) | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "usearch.componentSelectorLabels" (dict "root" . "component" $c) | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "usearch.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ $svc.service.port }}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector: {}
{{- end }}
