{{/* SPEC-DEPLOY-001 — usearch-mcp ServiceAccount (REQ-DEPLOY-009). */}}
{{- $c := "mcp" }}
{{- $svc := .Values.usearch.mcp }}
{{- if and $svc.enabled $svc.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "usearch.serviceAccountName" (dict "root" . "component" $c "svc" $svc) }}
  labels:
    {{- include "usearch.componentLabels" (dict "root" . "component" $c) | nindent 4 }}
{{- end }}
