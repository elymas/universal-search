{{- if .Values.usearch.mcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "universal-search.componentFullname" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "mcp") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "universal-search.componentLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "mcp") | nindent 4 }}
spec:
  replicas: {{ .Values.usearch.mcp.replicas }}
  selector:
    matchLabels:
      {{- include "universal-search.componentSelectorLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "mcp") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "universal-search.componentSelectorLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "mcp") | nindent 8 }}
        {{- with .Values.usearch.mcp.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/mcp/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "universal-search.serviceAccountName" (dict "Chart" .Chart "Release" .Release "Values" .Values "serviceAccount" .Values.usearch.mcp.serviceAccount "component" "mcp") }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: mcp
          image: {{ include "universal-search.image" (dict "Values" .Values "Chart" .Chart "image" .Values.usearch.mcp.image) }}
          imagePullPolicy: {{ .Values.usearch.mcp.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.usearch.mcp.env.MCP_PORT | default 8081 }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "universal-search.componentFullname" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "mcp") }}
          {{- if .Values.usearch.mcp.secretEnv }}
          env:
            {{- include "universal-search.secretEnvEntries" (dict "root" . "secretEnv" .Values.usearch.mcp.secretEnv "component" "mcp") | nindent 12 }}
          {{- end }}
          {{- with .Values.usearch.mcp.probes }}
          livenessProbe:
            {{- toYaml .liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .readiness | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.usearch.mcp.resources | nindent 12 }}
          {{- with .Values.usearch.mcp.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.usearch.mcp.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.usearch.mcp.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.usearch.mcp.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.usearch.mcp.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
