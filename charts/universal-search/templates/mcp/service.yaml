{{/* SPEC-DEPLOY-001 — usearch-mcp Service (REQ-DEPLOY-009). cluster-internal. */}}
{{- if .Values.usearch.mcp.enabled }}
{{- $c := "mcp" }}
{{- $svc := .Values.usearch.mcp }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "usearch.componentName" (dict "root" . "component" $c) }}
  labels:
    {{- include "usearch.componentLabels" (dict "root" . "component" $c) | nindent 4 }}
spec:
  type: {{ $svc.service.type }}
  selector:
    {{- include "usearch.componentSelectorLabels" (dict "root" . "component" $c) | nindent 4 }}
  ports:
    - name: http
      port: {{ $svc.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
