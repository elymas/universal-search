{{- if and .Values.usearch.mcp.enabled (eq .Values.secrets.backend "values") .Values.usearch.mcp.secretEnv }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "universal-search.componentFullname" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "mcp") }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "universal-search.componentLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "mcp") | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := .Values.usearch.mcp.secretEnv }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end }}
