{{/* SPEC-DEPLOY-001 — embedder Service + PVC + ServiceMonitor (REQ-DEPLOY-011). */}}
{{- if .Values.embedder.enabled }}
{{- $c := "embedder" }}
{{- $svc := .Values.embedder }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "usearch.componentName" (dict "root" . "component" $c) }}
  labels:
    {{- include "usearch.componentLabels" (dict "root" . "component" $c) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "usearch.componentSelectorLabels" (dict "root" . "component" $c) | nindent 4 }}
  ports:
    - name: http
      port: {{ $svc.service.port }}
      targetPort: http
{{- if and .Values.observability.serviceMonitor.enabled (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1") }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "usearch.componentName" (dict "root" . "component" $c) }}
  labels:
    {{- include "usearch.componentLabels" (dict "root" . "component" $c) | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "usearch.componentSelectorLabels" (dict "root" . "component" $c) | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.observability.serviceMonitor.interval }}
{{- end }}
{{- end }}
