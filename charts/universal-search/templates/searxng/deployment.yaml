{{/* SPEC-DEPLOY-001 — in-chart SearXNG metasearch (REQ-DEPLOY-015).
LICENSE: SearXNG is AGPL-3.0. It is consumed as a SERVICE BOUNDARY (separate
container, not linked into the application). See NOTES.txt and README.md for
license-compliance details. Image tag pinned to the exact compose tag. */}}
{{- if .Values.searxng.enabled }}
{{- $c := "searxng" }}
{{- $svc := .Values.searxng }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "usearch.componentName" (dict "root" . "component" $c) }}
  labels:
    {{- include "usearch.componentLabels" (dict "root" . "component" $c) | nindent 4 }}
  annotations:
    # AGPL-3.0 service boundary — see NOTICE / docs/dependencies.md.
    usearch.io/license: AGPL-3.0
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "usearch.componentSelectorLabels" (dict "root" . "component" $c) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "usearch.componentSelectorLabels" (dict "root" . "component" $c) | nindent 8 }}
    spec:
      {{- include "usearch.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: {{ $c }}
          image: {{ include "usearch.image" (dict "root" . "image" $svc.image) }}
          imagePullPolicy: {{ $svc.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.service.port }}
          env:
            - name: SEARXNG_BASE_URL
              value: {{ $svc.baseUrl | quote }}
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "usearch.secretName" . }}
                  key: SEARXNG_SECRET
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          {{- with $svc.resources }}
          resources: {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- if $svc.configMapName }}
          volumeMounts:
            - name: settings
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: true
      volumes:
        - name: settings
          configMap:
            name: {{ $svc.configMapName }}
          {{- end }}
{{- end }}
