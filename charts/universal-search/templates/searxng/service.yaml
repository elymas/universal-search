{{/* SPEC-DEPLOY-001 — SearXNG Service (REQ-DEPLOY-015, AGPL-3.0 service boundary). */}}
{{- if .Values.searxng.enabled }}
{{- $c := "searxng" }}
{{- $svc := .Values.searxng }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "usearch.componentName" (dict "root" . "component" $c) }}
  labels:
    {{- include "usearch.componentLabels" (dict "root" . "component" $c) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "usearch.componentSelectorLabels" (dict "root" . "component" $c) | nindent 4 }}
  ports:
    - name: http
      port: {{ $svc.service.port }}
      targetPort: http
{{- end }}
