    STORM_PORT: "8084"
    LITELLM_BASE_URL: "http://litellm:4000"
  secretEnv:
    LITELLM_API_KEY: ""
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  probes:
    liveness:
      httpGet:
        path: /health
        port: 8084
      initialDelaySeconds: 15
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      httpGet:
        path: /health
        port: 8084
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
  extraEnv: []
  extraVolumes: []
  extraVolumeMounts: []
  podAnnotations: {}
  podLabels: {}

# -- KoreaNews crawler sidecar (SPEC-ADP-009)
# Default disabled — operator opt-in.
koreanews:
  enabled: false
  image:
    repository: "universal-search/koreanews"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8085
  env:
    KOREANEWS_PORT: "8085"
  secretEnv: {}
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  probes:
    liveness:
      httpGet:
        path: /health
        port: 8085
      initialDelaySeconds: 15
      periodSeconds: 30
