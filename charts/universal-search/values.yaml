# =============================================================================
# In-chart custom services (not bundled as subcharts per D3)
# =============================================================================

# -- LiteLLM proxy (SPEC-LLM-001) — unified LLM gateway
litellm:
  enabled: true
  image:
    repository: "ghcr.io/berriai/litellm"
    tag: "v1.83.7-stable.patch.1"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 4000
  config:
    # Inline config.yaml content for LiteLLM
    # Operators should override this with their model list
    model_list: []
  env:
    LITELLM_BUDGET_USD: "0.50"
    DATABASE_URL: "postgresql://usearch:$(POSTGRES_PASSWORD)@postgresql:5432/usearch?sslmode=disable"
    REDIS_URL: "redis://redis-master:6379/0"
    OLLAMA_BASE_URL: ""
  secretEnv:
    LITELLM_MASTER_KEY: ""
    OPENAI_API_KEY: ""
    ANTHROPIC_API_KEY: ""
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  probes:
    liveness:
      httpGet:
        path: /health
        port: 4000
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 5
    readiness:
      httpGet:
        path: /health
        port: 4000
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 5
  extraEnv: []
  extraVolumes: []
  extraVolumeMounts: []
  podAnnotations: {}
  podLabels: {}

# -- SearXNG metasearch engine — AGPL-3.0, service-boundary consumed
# WARNING: SearXNG is AGPL-3.0 licensed. Consumed as an external service
# (service-boundary, not linked). See NOTICE for license compliance.
searxng:
  enabled: true
  image:
    repository: "searxng/searxng"
    tag: "2026.04.22-74f1ca203"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  settings:
    # Inline settings.yml — operators should override
    use_default_settings: true
    server:
      secret_key: ""
      base_url: ""
    search:
      formats:
        - html
        - json
  env:
    SEARXNG_BASE_URL: "http://searxng:8080/"
  secretEnv:
    SEARXNG_SECRET: ""
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  probes:
    liveness:
      httpGet:
        path: /
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 5
    readiness:
      httpGet:
        path: /
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 5
  extraEnv: []
  extraVolumes: []
  extraVolumeMounts: []
  podAnnotations: {}
  podLabels: {}

# -- Meilisearch keyword + hybrid index (in-chart StatefulSet, not subchart per D3)
meilisearch:
  enabled: true
  image:
    repository: "getmeili/meilisearch"
    tag: "v1.42.1"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 7700
  env:
    MEILI_ENV: "development"
  secretEnv:
    MEILI_MASTER_KEY: ""
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  probes:
    liveness:
      httpGet:
        path: /health
        port: 7700
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 5
    readiness:
      httpGet:
        path: /health
        port: 7700
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 5
  extraEnv: []
  extraVolumes: []
  extraVolumeMounts: []
  podAnnotations: {}
  podLabels: {}

# =============================================================================
# Infrastructure subcharts — Bitnami postgresql + redis, official qdrant
# Each can be disabled with <name>.enabled: false + external.* opt-out
# =============================================================================
postgresql:
  enabled: true
  # Bitnami subchart: preserve default registry (global.imageRegistry overrides it).
  image:
    registry: docker.io
  auth:
    username: usearch
    password: ""
    database: usearch
    existingSecret: ""
    secretKeys:
      userPasswordKey: "password"
  primary:
    persistence:
      enabled: true
      size: 10Gi
  external:
    host: ""
    port: 5432
    database: "usearch"

redis:
  enabled: true
  # Bitnami subchart: preserve default registry (global.imageRegistry overrides it).
  image:
    registry: docker.io
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 2Gi
  external:
    host: ""
    port: 6379

qdrant:
  enabled: true
  service:
    type: ClusterIP
  persistence:
    enabled: true
    size: 10Gi
  external:
    host: ""
    httpPort: 6333
    grpcPort: 6334

# =============================================================================
# Observability — ServiceMonitor + OTLP wiring (D6)
# Prometheus + OTel Collector NOT bundled — operator cluster-wide install assumed.
# =============================================================================
observability:
  serviceMonitor:
    enabled: true
  otlp:
    endpoint: ""
    # e.g. "otel-collector.observability.svc.cluster.local:4317"

# =============================================================================
# Migration job — golang-migrate pre-install/pre-upgrade Helm hook (D4)
# =============================================================================
migration:
  enabled: true
  image:
    repository: "universal-search/usearch-migrate"
    pullPolicy: IfNotPresent
  backoffLimit: 3

# =============================================================================
# Default password values for dev/CI (Tier 1 ONLY)
# WARNING: NEVER use Tier 1 ("values") in production!
# These are convenience defaults for docker-compose parity in dev.
# =============================================================================
secretsValues:
  # ONLY used when secrets.backend == "values"
  postgresPassword: "usearch"
  meiliMasterKey: "change_me_meilisearch_key"
  litellmMasterKey: "change_me_litellm_key"
  searxngSecret: "change_me_searxng_secret"
  openaiApiKey: ""
  anthropicApiKey: ""
  oidcClientSecret: ""
  jwtSigningKey: ""
  sessionSecret: ""
