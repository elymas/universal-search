# GoReleaser v2 configuration for SPEC-REL-001 release ceremony.
# REQ-REL-006: 3 binaries × {linux,darwin} × {amd64,arm64} = 12 archives
version: 2

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: usearch
    main: ./cmd/usearch
    binary: usearch
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/elymas/universal-search/internal/version.Version={{.Version}}
      - -X github.com/elymas/universal-search/internal/version.Commit={{.FullCommit}}
      - -X github.com/elymas/universal-search/internal/version.BuildDate={{.Date}}

  - id: usearch-api
    main: ./cmd/usearch-api
    binary: usearch-api
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/elymas/universal-search/internal/version.Version={{.Version}}
      - -X github.com/elymas/universal-search/internal/version.Commit={{.FullCommit}}
      - -X github.com/elymas/universal-search/internal/version.BuildDate={{.Date}}

  - id: usearch-mcp
    main: ./cmd/usearch-mcp
    binary: usearch-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/elymas/universal-search/internal/version.Version={{.Version}}
      - -X github.com/elymas/universal-search/internal/version.Commit={{.FullCommit}}
      - -X github.com/elymas/universal-search/internal/version.BuildDate={{.Date}}

archives:
  # {{ .Binary }} differentiates the 3 builds (usearch / usearch-api /
  # usearch-mcp) so they do not collide — yields 3 binaries x 2 OS x 2 arch
  # = 12 archives (REQ-REL-006).
  - name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: ["tar.gz"]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

# REQ-REL-009: cosign keyless (OIDC) signing of the checksum file.
# Signing SHA256SUMS transitively covers every archive (each archive's sha256
# is listed inside SHA256SUMS), so a single signature anchors all 12 archives.
# Produces a sigstore bundle (cert + signature) uploaded to the GitHub Release.
# Requires the cosign binary on PATH and `id-token: write` for OIDC in CI.
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    artifacts: checksum
    output: true
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"

# SBOM generation via anchore/syft (Nix-based, no additional dependency)
# REQ-REL-010: produces SPDX-format SBOM per archive + aggregate
sboms:
  - artifacts: archive
    documents:
      - "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}.spdx.json"

# REQ-REL-006 rationale: Windows targets deferred post-V1
# Go cross-compilation to Windows works, but: (1) usearch CLI is Unix-focused
# (no shell integration on Windows cmd.exe); (2) API/MCP servers target Linux
# deployment (Kubernetes); (3) Windows users can use WSL + linux/amd64 binary.
# (research §5.3) Post-V1 Windows support may be added via MSIX or separate SPEC.

# GoReleaser is the authoritative release path: `goreleaser release --clean`
# creates the GitHub Release and uploads all 12 archives, SHA256SUMS, SBOMs,
# and the cosign signature bundle natively via GITHUB_TOKEN.
# prerelease: auto marks v*.*.*-<pre> tags (e.g. v1.0.0-rc1) as pre-releases.
release:
  prerelease: auto
  footer: |
    ---
    Artifact integrity: each archive's SHA256 is recorded in `SHA256SUMS`, which
    is signed with cosign keyless (OIDC) — verify with:
    `cosign verify-blob --bundle SHA256SUMS.sigstore.json SHA256SUMS`

# Snapshot mode for local testing (--snapshot flag)
snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"
